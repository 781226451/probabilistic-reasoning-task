# 实验配置文件

# ── 时序参数（单位：毫秒） ──────────────────────────────────────
[timing]
initial_prompt_duration = 1500  # 初始提示显示时长
stimulus_duration = 1000        # 单个刺激显示时长
isi_duration = 1000             # 刺激间隔（ISI）时长
iti_duration = 800              # 试次间隔（ITI）时长
decision_timeout = 5000         # 决策阶段超时时长；设为 0 表示不限时

# ── 字体 ────────────────────────────────────────────────────────
[fonts]
name = "Noto Sans SC"
file = "assets/fonts/NotoSansSC-Regular.ttf"

# ── 显示配置（不同屏幕分辨率的视觉参数，尺寸单位：pix） ─────────
[profiles.4k]
name = "4K显示器 (3840×2160)"
screen_size = [3840, 2160]
shape_size = 250
circle_size = 80
side_circle_x_offset = 1400
instruction_text_height = 60
instruction_wrap_width = 1500
decision_text_height = 35
feedback_text_height = 40
end_text_height = 35

[profiles.macbook_16]
name = "MacBook 16寸 (2560×1600)"
screen_size = [2560, 1600]
shape_size = 165
circle_size = 55
side_circle_x_offset = 935
instruction_text_height = 40
instruction_wrap_width = 1000
decision_text_height = 23
feedback_text_height = 27
end_text_height = 23

[profiles.macbook_14]
name = "MacBook 14寸 (1512×982)"
screen_size = [1512, 982]
shape_size = 150
circle_size = 45
side_circle_x_offset = 550
instruction_text_height = 30
instruction_wrap_width = 590
decision_text_height = 30
feedback_text_height = 30
end_text_height = 30
